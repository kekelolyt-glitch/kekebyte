<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>KEKEINTEL OSINT</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

font-family:Arial;

color:white;

height:100vh;

overflow:hidden;


background:

linear-gradient(
rgba(0,0,0,.93),
rgba(0,0,0,.93)
),

url("eyes.jpg");

background-size:cover;

}



/* LOGIN */


#loginBox{


position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:420px;

padding:30px;


background:rgba(5,8,15,.9);

backdrop-filter:blur(20px);


border-radius:20px;


box-shadow:

0 0 50px black;


}


#loginBox h2{


text-align:center;

font-size:38px;

color:#4f7cff;

text-shadow:

0 0 20px #4f7cff;


margin-bottom:25px;


}


input{


width:100%;

padding:15px;

margin-top:15px;


background:#05070d;

border:1px solid #222;


border-radius:12px;

color:white;


}



button{


width:100%;

padding:15px;

margin-top:18px;


border:none;

border-radius:12px;


background:

linear-gradient(
90deg,
#355dff,
#4f7cff
);


color:white;

font-weight:bold;

cursor:pointer;


}



#error{

color:red;

text-align:center;

margin-top:15px;

}





/* DASHBOARD */


#dashboard{

display:none;

height:100vh;

background:

radial-gradient(
circle,
#10182d,
#020306
);


}



.sidebar{


width:260px;

padding:25px;


background:

rgba(5,8,15,.85);


border-right:

1px solid #222;


}



.sidebar h2{


color:#4f7cff;

letter-spacing:3px;

text-shadow:

0 0 20px #4f7cff;


margin-bottom:30px;

}



.menu div{


padding:15px;

margin-bottom:12px;


background:

#11151d;


border-radius:12px;


cursor:pointer;


transition:.3s;


}



.menu div:hover{


transform:translateX(8px);


box-shadow:

0 0 20px #4f7cff;


}




.main{


flex:1;

padding:35px;

overflow:auto;


}



.main h2{


font-size:35px;

letter-spacing:4px;

text-shadow:

0 0 20px #4f7cff;


}



.card{


background:

rgba(15,20,30,.9);


padding:25px;


margin-top:20px;


border-radius:18px;


border:

1px solid #222;


box-shadow:

0 0 30px black;


}



.badge{


background:#00ff88;

color:black;

padding:6px 12px;

border-radius:20px;


}


</style>

</head>



<body>



<div id="loginBox">


<h2>
KEKEINTEL
</h2>


<input id="user" placeholder="Username">


<input id="pass" type="password" placeholder="Password">


<button onclick="login()">

ACCESS

</button>


<p id="error"></p>


</div>





<div id="dashboard">



<div class="sidebar">


<h2>
KEKEINTEL
</h2>


<div class="menu">


<div onclick="showPage('home')">
Dashboard
</div>


<div onclick="showPage('ip')">
IP Intelligence
</div>


<div onclick="showPage('dns')">
DNS Scanner
</div>


<div onclick="showPage('whois')">
WHOIS
</div>


<div onclick="showPage('email')">
Email Check
</div>


<div onclick="showPage('api')">
API Core
</div>


<div onclick="logout()">
Logout
</div>


</div>


</div>




<div class="main" id="content">


<h2>
☠ KEKEINTEL CORE
</h2>


<div class="card">

🟢 System

<span class="badge">
ONLINE
</span>


</div>


<div class="card">

📡 Intelligence modules ready

<br><br>

IP ✔

<br>

DNS ✔

<br>

WHOIS ✔

<br>

EMAIL ✔


</div>



</div>



</div>







<script>


function login(){


let u=user.value;

let p=pass.value;



if(u=="admin" && p=="admin"){


loginBox.style.display="none";


dashboard.style.display="flex";


}


else{


error.innerHTML="ACCESS DENIED";


}


}





function logout(){

location.reload();

}







function showPage(page){


let c=document.getElementById("content");



if(page=="home"){


c.innerHTML=`

<h2>
☠ KEKEINTEL CORE
</h2>


<div class="card">

SYSTEM STATUS

<span class="badge">
ONLINE
</span>


</div>


<div class="card">

Active Engines:

<br><br>

IP Scanner

<br>

DNS Engine

<br>

WHOIS Database

<br>

Email Analyzer

</div>


`;

}





if(page=="ip"){


c.innerHTML=`

<h2>🌐 IP INTELLIGENCE</h2>


<div class="card">

<input id="ip" placeholder="8.8.8.8">

<button onclick="ipScan()">

SCAN

</button>


</div>


<div class="card" id="ipr">

Waiting...

</div>


`;

}





if(page=="dns"){


c.innerHTML=`

<h2>🌐 DNS SCANNER</h2>


<div class="card">

<input id="domain" placeholder="google.com">

<button onclick="dnsScan()">

SCAN

</button>


</div>


<div class="card" id="dnsr">

Waiting...

</div>


`;

}





if(page=="whois"){


c.innerHTML=`

<h2>🌍 WHOIS</h2>


<div class="card">

<input id="who" placeholder="example.com">


<button onclick="whoisScan()">

SEARCH

</button>


</div>


<div class="card" id="whor">

Waiting...

</div>


`;

}





if(page=="email"){


c.innerHTML=`

<h2>📧 EMAIL CHECK</h2>


<div class="card">

<input id="mail" placeholder="test@gmail.com">


<button onclick="mailCheck()">

CHECK

</button>


</div>


<div class="card" id="mailr">

Waiting...

</div>


`;

}





if(page=="api"){


c.innerHTML=`

<h2>⚡ API CORE</h2>


<div class="card">

🟢 IP API ONLINE

</div>


<div class="card">

🟢 DNS GOOGLE API ONLINE

</div>


<div class="card">

🟢 RDAP WHOIS ONLINE

</div>


`;

}



}








async function ipScan(){


let r=ipr;

r.innerHTML="Scanning...";


let x=await fetch(

"https://ipapi.co/"+ip.value+"/json/"

);


let d=await x.json();



r.innerHTML=

`

IP:
${d.ip}

<br>

Country:
${d.country_name}

<br>

City:
${d.city}

<br>

ISP:
${d.org}

<br>

ASN:
${d.asn}

`;

}




async function dnsScan(){


dnsr.innerHTML="Scanning...";


let x=await fetch(

"https://dns.google/resolve?name="+domain.value+"&type=A"

);


let d=await x.json();



let out="";


if(d.Answer){

d.Answer.forEach(a=>{

out+=a.data+"<br>";

});

}


dnsr.innerHTML=out || "No Record";


}





async function whoisScan(){


whor.innerHTML="Searching...";


let x=await fetch(

"https://rdap.org/domain/"+who.value

);


let d=await x.json();



whor.innerHTML=

`

Domain:

${d.ldhName}

<br>

Status:

${d.status}


`;

}





function mailCheck(){


let r=mailr;


let reg=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;


if(reg.test(mail.value)){


r.innerHTML=

`

✅ Valid Email

<br>

Provider:

${mail.value.split("@")[1]}

`;

}

else{


r.innerHTML="❌ Invalid";


}



}




</script>


</body>
</html>
